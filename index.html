<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSAP Generative Canvas (One-Shot Ripple)</title>
  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/webm-muxer/build/webm-muxer.js"></script>
</head>
<body>

  <div id="controls">
    <h3>Water Ripple Generator</h3>
    
    <div class="ui-panel">
      <span class="control-label">Palette Settings:</span>
      <div id="ui-color-swatches">
        </div>
    </div>

    <div class="ui-panel" id="slider-container-complexity">
      <div class="slider-header">Amount <span id="val-complexity">3</span></div>
      <div class="custom-slider"><div class="custom-slider-track"><div class="custom-slider-fill"></div></div><div class="custom-slider-thumb"></div></div>
    </div>
    
    <div class="ui-panel" id="slider-container-size">
      <div class="slider-header">Size <span id="val-size">1.0</span></div>
      <div class="custom-slider"><div class="custom-slider-track"><div class="custom-slider-fill"></div></div><div class="custom-slider-thumb"></div></div>
    </div>
    
    <div class="ui-panel" id="slider-container-speed">
      <div class="slider-header">Speed <span id="val-speed">1.10</span></div>
      <div class="custom-slider"><div class="custom-slider-track"><div class="custom-slider-fill"></div></div><div class="custom-slider-thumb"></div></div>
    </div>

    <div class="ui-panel" id="slider-container-easing">
      <div class="slider-header">Ripple Easing <span id="val-easing">1.0</span></div>
      <div class="custom-slider"><div class="custom-slider-track"><div class="custom-slider-fill"></div></div><div class="custom-slider-thumb"></div></div>
    </div>

    <div class="ui-panel" id="slider-container-opacity">
      <div class="slider-header">Fade Falloff <span id="val-opacity">0.50</span></div>
      <div class="custom-slider"><div class="custom-slider-track"><div class="custom-slider-fill"></div></div><div class="custom-slider-thumb"></div></div>
    </div>

    <div class="ui-panel" id="slider-container-dotsize">
      <div class="slider-header">Dot Size <span id="val-dotsize">3.00</span></div>
      <div class="custom-slider"><div class="custom-slider-track"><div class="custom-slider-fill"></div></div><div class="custom-slider-thumb"></div></div>
    </div>

    <div class="ui-panel" id="slider-container-thickness">
      <div class="slider-header">Thickness <span id="val-thickness">95</span></div>
      <div class="custom-slider"><div class="custom-slider-track"><div class="custom-slider-fill"></div></div><div class="custom-slider-thumb"></div></div>
    </div>

    <div class="ui-panel" id="slider-container-startradius">
      <div class="slider-header">Start Radius <span id="val-startradius">20</span></div>
      <div class="custom-slider"><div class="custom-slider-track"><div class="custom-slider-fill"></div></div><div class="custom-slider-thumb"></div></div>
    </div>

    <hr>
    
    <div class="export-row" style="margin-top: 8px;">
      <button id="exportHdBtn" class="export-mode">Export HD</button>
      <button id="export4kBtn" class="export-mode">Export 4K</button>
    </div>
    <span id="recordingStatus" class="hidden">🔴 Preparing Video...</span>
  </div>

  <canvas id="generativeCanvas"></canvas>

  <script src="sketch.js"></script>
</body>
</html>
